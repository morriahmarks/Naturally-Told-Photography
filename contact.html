<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Naturally Told Photography</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-inner">

        <img src="images/NTP-logo-vertical.png"
             alt="Naturally Told Photography Logo"
             class="header-logo">

        <div>
            <h1>Naturally Told Photography</h1>
            <p>Documentary-style photography for real moments, milestones, and everyday life.</p>
        </div>

    </div>
</header>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<main>
    <h2>Contact</h2>

    <form>
        <label>Name:</label>
        <input type="text">

        <label>Email:</label>
        <input type="email">

        <label>Message:</label>
        <textarea rows="5"></textarea>

        <button type="submit">Send</button>
    </form>
</main>

<footer>
    <div class="footer-inner">

        <img src="images/NTP-logo-horizontal.png"
             alt="Naturally Told Photography Logo"
             class="footer-logo">

        <div class="footer-right">

            <p>&copy; 2026 Naturally Told Photography</p>

            <div class="footer-icons">

                <a href="https://instagram.com/youraccount" target="_blank" aria-label="Instagram">
                    <img src="images/icon-ig.png" alt="Instagram">
                </a>

                <a href="mailto:youremail@example.com" aria-label="Email">
                    <img src="images/icon-email.png" alt="Email">
                </a>

                <a href="tel:12085551212" aria-label="Phone">
                    <img src="images/icon-phone.png" alt="Phone">
                </a>

            </div>

        </div>

    </div>
</footer>

</body>
</html>
